    <style>
        /* Reset margins on the main page */
        html, body {

            overflow: hidden; /* Stops scrollbars from appearing */
            background-color: #000; /* Makes the background black */

        embed {
            position: fixed; /* Locks it to the screen */
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
            display: block;
            z-index: 9999; /* Ensures it sits on top of everything */
        }
    </style>
