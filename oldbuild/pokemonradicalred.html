 <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokémon Radical Red (GBA)</title>
    <style>
        /* Zero distractions. Pitch black background. */
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #000;
            overflow: hidden;
        }

        /* Container fills the entire window */
        #game-container {
            width: 100vw;
            height: 100vh;
            display: block;
        }
    </style>
</head>
<body>

    <div id="game-container"></div>

    <script>
        // 1. Tell the emulator where to load
        window.EJS_player = '#game-container';
        
        // 2. Tell the emulator which console core to use
        window.EJS_core = 'gba';
        
        // 3. Provide the RAW CDN link to the patched ROM
        window.EJS_gameUrl = 'https://cdn.jsdelivr.net/gh/bubbls/ugss@5d68b95d0791cb9ee118f1c90c3f8008ab2f84a2/radical%20red/Pokemon%20-%20FireRed%20Version%20(USA%2C%20Europe)%20(patched)%20(1).gba';
        
        // 4. Point to the EmulatorJS core files network
        window.EJS_pathtodata = 'https://cdn.emulatorjs.org/stable/data/';
    </script>

    <script src="https://cdn.emulatorjs.org/stable/data/loader.js"></script>

</body>
</html>
