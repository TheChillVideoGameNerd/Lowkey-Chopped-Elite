<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Papa's Scooperia</title>
    <style>
        /* Reset to fill screen */
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #000; /* Pitch Black */
            overflow: hidden;
        }

        #game-container {
            width: 100%;
            height: 100%;
            display: block;
        }

        /* Force Ruffle to fill the container */
        ruffle-player {
            width: 100%;
            height: 100%;
        }
    </style>
</head>
<body>

    <div id="game-container"></div>

    <script src="https://unpkg.com/@ruffle-rs/ruffle"></script>

    <script>
        window.RufflePlayer = window.RufflePlayer || {};
        
        window.addEventListener("load", (event) => {
            const ruffle = window.RufflePlayer.newest();
            const player = ruffle.createPlayer();
            const container = document.getElementById("game-container");
            
            container.appendChild(player);
            
            // Converted to Raw Link
            player.load("https://cdn.jsdelivr.net/gh/Bescr01/swf@e2ab9deab96c02aaa67e56334d34ccea3bbb8a3e/Papa's%20Scooperia.swf");
            
            // Fullscreen settings
            player.style.width = "100%";
            player.style.height = "100%";
        });
    </script>

</body>
</html>
