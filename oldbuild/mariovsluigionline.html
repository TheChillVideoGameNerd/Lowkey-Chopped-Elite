 <!DOCTYPE html>
<html lang="en-us">
<head>
<meta charset="utf-8">
<title>Mario VS Luigi</title>
<style>
body { margin: 0; padding: 0; overflow: hidden; background: #231f20; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
#unity-container { width: 100vw; height: 100vh; display: flex; align-items: center; justify-content: center; position: relative; }
canvas { width: 100%; height: 100%; background: #231f20; display: block; }

#loading-overlay {
position: absolute;
top: 0; left: 0;
width: 100%; height: 100%;
background: #231f20;
display: flex;
flex-direction: column;
align-items: center;
justify-content: center;
z-index: 10;
color: white;
}


.spinner {
width: 40px;
height: 40px;
border: 4px solid rgba(255,255,255,0.1);
border-top-color: #e52521;
border-radius: 50%;
animation: spin 0.8s linear infinite;
margin-bottom: 20px;
}


@keyframes spin { to { transform: rotate(360deg); } }

.loading-text {
font-weight: bold;
font-size: 1.2rem;
letter-spacing: 1px;
margin-bottom: 8px;
color: #ffffff;
}


.description {
font-size: 0.85rem;
color: #aaaaaa;
max-width: 300px;
text-align: center;
line-height: 1.4;
}
</style>
</head>
<body>
<div id="unity-container">
<div id="loading-overlay">
<div class="spinner"></div>
<div class="loading-text" id="load-info">STARTING ENGINE...</div>
<div class="description">[DISCLAIMER]: This game has online servers. Lowkey Chopped is not responsible for any crude language or activity in said servers.</div>
</div>
<canvas id="unity-canvas" tabindex="-1"></canvas>
</div>
<script src="https://martinmmcyt.github.io/nsmb-mario-vs-luigi/pc/Build/MarioVsLuigi-WebGL.loader.js"></script>
<script>
const canvas = document.querySelector("#unity-canvas");
const overlay = document.querySelector("#loading-overlay");
const info = document.querySelector("#load-info");


const config = {
dataUrl: "https://martinmmcyt.github.io/nsmb-mario-vs-luigi/pc/Build/MarioVsLuigi-WebGL.data.unityweb",
frameworkUrl: "https://martinmmcyt.github.io/nsmb-mario-vs-luigi/pc/Build/MarioVsLuigi-WebGL.framework.js.unityweb",
codeUrl: "https://martinmmcyt.github.io/nsmb-mario-vs-luigi/pc/Build/MarioVsLuigi-WebGL.wasm.unityweb",
streamingAssetsUrl: "https://martinmmcyt.github.io/nsmb-mario-vs-luigi/pc/StreamingAssets",
companyName: "ipodtouch0218",
productName: "NSMB-MarioVsLuigi",
productVersion: "2.0.4.1",
};


createUnityInstance(canvas, config, (progress) => {
info.textContent = "LOADING: " + Math.round(100 * progress) + "%";
}).then((unityInstance) => {
overlay.style.display = "none";
}).catch((message) => {
info.textContent = "BOOT ERROR";
console.error(message);
});
</script>
</body>
</html>
