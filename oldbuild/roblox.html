<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Roblox</title>
<link rel="icon" type="image/png" href="/roblox_icon.png">
<style>
/* This removes the default padding/margin from the browser */
body, html {
margin: 0;
padding: 0;
height: 100%;
width: 100%;
overflow: hidden; /* Prevents scrollbars */
background-color: #000;
}

/* This forces the iframe to fill the entire viewport */
.fullscreen-iframe {
position: absolute;
top: 0;
left: 0;
width: 100%;
height: 100%;
border: none;
}
</style>
</head>
<body>

<iframe
class="fullscreen-iframe"
src="https://sennistex.w3spaces.com/scramjet/embed.html#https://172.ip.nowgg.lol/apps/a/19900/b.html"
allow="autoplay; fullscreen">
</iframe>

</body>
</html>
