 <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Papa's Pizzeria</title>
    <style>
        /* Reset to fill screen */
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #000; /* Pitch Black */
            overflow: hidden;
        }

        #game-container {
            width: 100%;
            height: 100%;
            display: block;
        }

        /* Force Ruffle to fill the container */
        ruffle-player {
            width: 100%;
            height: 100%;
        }
    </style>
</head>
<body>

    <div id="game-container"></div>

    <script src="https://unpkg.com/@ruffle-rs/ruffle"></script>

    <script>
        window.RufflePlayer = window.RufflePlayer || {};
        
        window.addEventListener("load", (event) => {
            const ruffle = window.RufflePlayer.newest();
            const player = ruffle.createPlayer();
            const container = document.getElementById("game-container");
            
            container.appendChild(player);
            
            // Converted to Raw Link
            player.load("https://raw.githubusercontent.com/Lastvagen/papaspizzeria/main/Papa's%20Pizzeria.swf");
            
            // Fullscreen settings
            player.style.width = "100%";
            player.style.height = "100%";
        });
    </script>

</body>
</html>
